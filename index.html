<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AEDLP Policy Creator</title>
    <meta
      name="description"
      content="Assemble AEDLP DLP policies from a curated detector library — copy &amp; paste, no API, nothing leaves your browser."
    />
    <!-- Brand favicon: modern SVG with PNG fallbacks. Assets live in public/. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f6f8" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0c10" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the persisted theme on first paint so there is no flash.
      (function () {
        try {
          var t = localStorage.getItem("aedlp-theme") || "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          /* localStorage unavailable; fall back to default light theme */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
